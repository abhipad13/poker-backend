<!doctype html>
<html>
  <body>
    <h3>WS Log Tester</h3>
    <pre id="out"></pre>
    <script type="module">
      import { Client } from "https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/esm6/index.min.js";

      const gameId = prompt("Enter gameId:");
      const out = document.getElementById('out');
      const println = (m) => out.textContent += m + "\n";

      const client = new Client({
        brokerURL: "ws://localhost:8080/ws", // or wss://your-host/ws
        reconnectDelay: 2000,
        debug: (str) => console.log(str),
      });

      client.onConnect = () => {
        println("✅ STOMP connected");
        client.subscribe(`/topic/game/${gameId}/logs`, (msg) => {
          println("📨 " + msg.body);
        });
        println(`📡 Subscribed to /topic/game/${gameId}/logs`);
      };

      client.onStompError = (frame) => println("❌ STOMP error: " + frame.headers['message']);

      client.activate();
    </script>
  </body>
</html>
