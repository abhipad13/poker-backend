# -------------------------------------------------------
# API MODE: Backend serves only the API and WebSocket.
# Frontend is hosted separately (e.g. Vercel).
# Usage: ./gradlew bootRun --args='--spring.profiles.active=api'
#
# Before deploying: replace the placeholder URLs below
# with your actual Vercel frontend URL.
# -------------------------------------------------------

app.serve-static=false

# Replace with your Vercel frontend URL (no trailing slash)
cors.allowed-origins=https://your-app.vercel.app

# Replace with your Vercel frontend URL
websocket.allowed-origin-patterns=https://your-app.vercel.app
