# -------------------------------------------------------
# STATIC MODE: Spring Boot serves the compiled React app.
# Usage: ./gradlew bootRun --args='--spring.profiles.active=static'
#
# Before running:
#   1. Build the frontend: npm run build  (in your frontend folder)
#   2. Copy the output into: src/main/resources/static/
# -------------------------------------------------------

app.serve-static=true

# Frontend is same-origin so CORS only needs to cover local dev
cors.allowed-origins=http://localhost:5173,http://localhost:8080

# Allow all WebSocket origins (same-origin in prod, localhost in dev)
websocket.allowed-origin-patterns=*
