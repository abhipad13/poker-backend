<!DOCTYPE html>
<html>
<head>
    <title>Poker WebSocket Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h1>Poker WebSocket Test</h1>
    <div>
        <label for="gameId">Game ID:</label>
        <input type="text" id="gameId" value="2c019c1d" />
        <button onclick="connect()">Connect to Game Logs</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    <div>
        <h3>Game Log Messages:</h3>
        <div id="messages" style="border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px;"></div>
    </div>

    <script>
        let stompClient = null;
        let connected = false;

        function connect() {
            const gameId = document.getElementById('gameId').value;
            if (!gameId) {
                alert('Please enter a Game ID');
                return;
            }

            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                connected = true;
                
                // Subscribe to game logs
                stompClient.subscribe('/topic/game/' + gameId + '/logs', function (message) {
                    const logEntry = JSON.parse(message.body);
                    displayMessage(logEntry);
                });
                
                displayMessage({type: 'SYSTEM', message: 'Connected to game logs for game: ' + gameId});
            }, function(error) {
                console.error('STOMP error: ' + error);
                displayMessage({type: 'ERROR', message: 'Connection failed: ' + error});
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
                connected = false;
                displayMessage({type: 'SYSTEM', message: 'Disconnected from WebSocket'});
            }
        }

        function displayMessage(logEntry) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.style.marginBottom = '5px';
            messageDiv.style.padding = '5px';
            messageDiv.style.backgroundColor = getBackgroundColor(logEntry.type);
            
            const timestamp = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `<strong>[${timestamp}] ${logEntry.type}:</strong> ${logEntry.message}`;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function getBackgroundColor(type) {
            switch(type) {
                case 'SYSTEM': return '#e3f2fd';
                case 'PLAYER_ACTION': return '#f3e5f5';
                case 'RESULT': return '#e8f5e8';
                case 'ERROR': return '#ffebee';
                default: return '#fafafa';
            }
        }

        // Auto-connect on page load
        window.onload = function() {
            setTimeout(connect, 1000);
        };
    </script>
</body>
</html>
